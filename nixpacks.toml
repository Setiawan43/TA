[phases.setup]
nixPkgs = ["python311", "nodejs_20", "gcc", "stdenv.cc.cc.lib", "zlib"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv && /opt/venv/bin/pip install --upgrade pip && /opt/venv/bin/pip install -r backend/requirements.txt",
  "npm install --prefix frontend"
]

[phases.build]
cmds = [
  "npm run build --prefix frontend"
]

[start]
cmd = "/opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend"
