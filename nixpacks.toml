[phases.setup]
nixPkgs = ["python311", "nodejs_20", "stdenv.cc.cc.lib"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r backend/requirements.txt",
  "npm install --prefix frontend"
]

[phases.build]
cmds = [
  "npm run build --prefix frontend"
]

[start]
cmd = "export LD_LIBRARY_PATH=$(nix-build --no-out-link '<nixpkgs>' -A stdenv.cc.cc.lib)/lib:$LD_LIBRARY_PATH && /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend"
